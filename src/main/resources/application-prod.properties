spring.application.name=helpdesk-api

server.port=${PORT:8083}

# Banco de dados (Render fornece a DATABASE_URL no formato postgres://user:pass@host:port/db)
# Usamos variáveis separadas para compatibilidade com Spring
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/serviceSite}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
projeto.jwtSecret=${JWT_SECRET}
projeto.jwtExpirationMs=900000

# IA — Google Gemini
ia.gemini.apiKey=${IA_GEMINI_API_KEY:}
ia.gemini.model=gemini-2.0-flash
ia.gemini.baseUrl=https://generativelanguage.googleapis.com/v1beta
ia.gemini.timeoutMs=30000
