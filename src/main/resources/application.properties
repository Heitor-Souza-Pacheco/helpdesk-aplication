spring.application.name=demo

server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5432/serviceSite
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

projeto.jwtSecret=${JWT_SECRET}
projeto.jwtExpirationMs=900000

# IA — Google Gemini (tier gratuito em https://aistudio.google.com/app/apikey)
ia.gemini.apiKey=${IA_GEMINI_API_KEY:}
ia.gemini.model=gemini-2.0-flash
ia.gemini.baseUrl=https://generativelanguage.googleapis.com/v1beta
ia.gemini.timeoutMs=30000
